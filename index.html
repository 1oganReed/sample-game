<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Rush</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <audio id="btn-click" src="images/button-click.mp3"></audio>
    <audio id="bg-music" src="images/cooking-music.mp3"></audio>
    <audio id="customer-greeting" src="images/greeting.mp3"></audio>
    <audio id="write-order" src="images/writing.mp3"></audio>
    <audio id="correct-choice" src="images/correct.mp3"></audio>
    <audio id="gain-money" src="images/cha-ching.mp3"></audio>
    <audio id="incorrect-choice"  src="images/incorrect.mp3"></audio>
    <audio id="game-over"  src="images/game-over.mp3"></audio>
    <audio id="clock-tick" src="images/clock-tick.mp3"></audio>
 
    <button id="pauseMusicBtn">Pause Music</button>
    <!-- HOME SCREEN -->
    <div id="screenHome" class="screen active">
        <h1 id="homeTitle">Welcome to the Restaurant!</h1>
        <div id="homeButtons">
            <button id="startBtn">Start Your Shift!</button>
            <button id="howToBtn">How To Play</button>
        </div>
    </div>
 
    <!-- LOBBY SCREEN -->
    <div id="screenLobby" class="screen">
 
        <img id="cafeImg" src="images/interior.png" alt="Cafe Interior">
 
        <div id="hudHistory" class="hud-card">
            <h2>History</h2>
            <p class="hud-label">Money</p>
            <p id="moneyDisplay">$0</p>
            <p class="hud-label">Customers Served:</p>
            <p id="customersDisplay">0</p>
        </div>
 
        <div id="hudOrder" class="hudCard">
            <h2>Current Order</h2>
            <p class="hud-label">Customer:</p>
            <p id="customerNameDisplay">None 🙂</p>
            <p class="hud-label">Order:</p>
            <p id="orderDisplay">Waiting...</p>
        </div>
 
        <div id="customerArea">
            <div id="speechBubble">
                <p id="speechText">Hello! I'd like to order.</p>
            </div>
            <img id="customerImg" src="" alt="customer">
            <button id="takeOrderBtn">Take Order</button>
        </div>
 
        <button id="goKitchenBtn" class="hidden">Go to Kitchen</button>
    </div>
 
    <!-- KITCHEN SCREEN -->
    <div id="screenKitchen" class="screen">
 
        <img id="kitchenImg" src="images/kitchen.png" alt="Kitchen">
 
        <!-- Timer — top center -->
        <div id="timerDisplay">10s</div>
 
        <!-- Order reminder — top right -->
        <div id="hudKitchenOrder" class="hudCard">
            <h2>Preparing Order</h2>
            <p class="hud-label">Customer:</p>
            <p id="kitchenCustomerName">—</p>
            <p class="hud-label">Order:</p>
            <p id="kitchenOrderItem">—</p>
        </div>
 
        <!-- Progress tracker — shows each step as a pill, turns green when done -->
        <div id="stepProgress"></div>
 
        <!-- Step buttons — built dynamically by JS from currentCustomer.steps -->
        <div id="stepButtons"></div>
 
    </div>
 
    <!-- VICTORY SCREEN -->
    <div id="screenVictory" class="screen">
        <h1>Congratulations!</h1>
        <p>You reached $50! You've made enough money!</p>
        <div id="victoryButtons">
            <button id="continueBtn">Continue Playing</button>
            <button id="victoryHomeBtn">Return to Home</button>
        </div>
    </div>
    <!-- GAME OVER SCREEN -->
    <div id="screenGameOver" class="screen">
        <h1>Game Over!</h1>
        <p>You ran out of money!</p>
        <div id="gameOverButtons">
            <button id="retryBtn">Retry</button>
            <button id="homeBtn">Return to Home</button>
        </div>
    </div>
 
    <script src="script.js"></script>
</body>
</html>
